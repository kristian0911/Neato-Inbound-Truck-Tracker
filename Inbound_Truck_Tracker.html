<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Inbound Truck Tracker</title>
  <link rel="apple-touch-icon" href="/icon.png">
  <link rel="icon" type="image/png" href="/icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600&family=Saira+Condensed:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C0C0C;--panel:#141414;--panel2:#1C1C1C;--line:#2A2A2A;
  --ink:#F4F3EC;--muted:#888880;--faint:#555552;
  --yellow:#F5C518;--shadow:0 16px 40px -14px rgba(0,0,0,.85);
  --s-pending:#555552;--s-confirmed:#60A5FA;--s-transit:#FBBF24;
  --s-arrived:#F5C518;--s-unloading:#FB923C;--s-complete:#34D399;--s-overdue:#F87171;
  --v-illy:#60A5FA;--v-ea:#34D399;--v-kennys:#FBBF24;--v-finleys:#C084FC;--v-surefire:#FB923C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%}
body{background:radial-gradient(900px 500px at 80% -5%,rgba(245,197,24,.06),transparent 55%),var(--bg);
  color:var(--ink);font-family:"Saira",system-ui,sans-serif;background-attachment:fixed}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:52px 52px;opacity:.05}
.wrap{position:relative;z-index:1;max-width:1280px;margin:0 auto;padding:14px 16px 60px}

/* HEADER */
header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:6px 0 16px;border-bottom:1px solid var(--line);margin-bottom:20px}
.brand{display:flex;align-items:center;gap:11px;flex:none}
.nlogo{display:flex;align-items:center;gap:7px}
.nlogo .smiley{font-size:22px;line-height:1}
.nlogo .wordmark{font-family:"Saira Condensed",sans-serif;font-weight:800;font-size:20px;letter-spacing:.02em;color:var(--ink)}
.divider{width:1px;height:28px;background:var(--line);flex:none}
.app-title{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:20px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
.app-title small{display:block;font-family:"Saira",sans-serif;font-weight:400;font-size:10px;letter-spacing:.3em;color:var(--muted);margin-top:1px}
.spacer{flex:1}
.clock-hdr{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted)}

/* SYNC INDICATOR */
.sync-pill{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);
  border-radius:20px;padding:4px 10px;font-family:"Saira Condensed",sans-serif;font-weight:600;font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:default;transition:color .2s,border-color .2s;
  user-select:none;white-space:nowrap}
.sync-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background .2s}
.sync-pill[data-state="synced"]{color:#34D399;border-color:rgba(52,211,153,.3)}
.sync-pill[data-state="synced"] .dot{background:#34D399}
.sync-pill[data-state="syncing"]{color:#FBBF24;border-color:rgba(251,191,36,.3)}
.sync-pill[data-state="syncing"] .dot{background:#FBBF24}
.sync-pill[data-state="stale"]{color:#F87171;border-color:rgba(248,113,113,.35)}
.sync-pill[data-state="stale"] .dot{background:#F87171}
.sync-pill.pulse .dot{animation:syncPulse .9s ease-out}
@keyframes syncPulse{
  0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)}
  100%{box-shadow:0 0 0 8px rgba(52,211,153,0)}
}
.btn{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--ink);
  font-family:"Saira Condensed",sans-serif;font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:12px;
  padding:9px 15px;border-radius:10px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--yellow);background:var(--panel2)}
.btn.primary{background:var(--yellow);border-color:var(--yellow);color:#1A1200}
.btn.primary:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent}
.btn.danger{color:#F87171;border-color:rgba(248,113,113,.35)}
.btn.sm{padding:6px 11px;font-size:11px}

/* KPIs */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.kpi{background:linear-gradient(160deg,var(--panel),#101010);border:1px solid var(--line);border-radius:13px;padding:14px 15px;position:relative;overflow:hidden}
.kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--kc,var(--line))}
.kpi .kv{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:28px;line-height:1;color:var(--kc,var(--ink))}
.kpi .kl{font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:5px}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.seg label{font-size:9px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase;padding:0 10px;display:grid;place-items:center;border-right:1px solid var(--line)}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);font-family:"Saira",sans-serif;font-weight:500;padding:9px 13px;cursor:pointer;font-size:13px;transition:.14s;white-space:nowrap}
.seg button.active{background:var(--panel2);color:var(--ink)}
.search-box{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--ink);
  font-family:"Saira",sans-serif;font-size:13px;padding:9px 13px;outline:none;width:190px;transition:.14s}
.search-box:focus{border-color:var(--yellow)}
.search-box::placeholder{color:var(--faint)}

/* TABLE */
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{font-family:"Saira Condensed",sans-serif;text-transform:uppercase;letter-spacing:.12em;font-size:11px;color:var(--muted);
  text-align:left;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--panel)}
td{padding:11px 14px;border-bottom:1px solid #1C1C1C;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(245,197,24,.025);cursor:pointer}
.mono{font-family:"JetBrains Mono",monospace}
.po-num{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:16px}

/* STATUS BADGES */
.sbadge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;
  letter-spacing:.06em;text-transform:uppercase;border:1px solid transparent;white-space:nowrap}
.s-pending{background:rgba(85,85,82,.18);color:var(--muted);border-color:rgba(85,85,82,.3)}
.s-confirmed{background:rgba(96,165,250,.12);color:#60A5FA;border-color:rgba(96,165,250,.3)}
.s-transit{background:rgba(251,191,36,.12);color:#FBBF24;border-color:rgba(251,191,36,.3)}
.s-arrived{background:rgba(245,197,24,.14);color:var(--yellow);border-color:rgba(245,197,24,.35)}
.s-unloading{background:rgba(251,146,60,.12);color:#FB923C;border-color:rgba(251,146,60,.3)}
.s-complete{background:rgba(52,211,153,.1);color:#34D399;border-color:rgba(52,211,153,.25)}
.s-overdue{background:rgba(248,113,113,.12);color:#F87171;border-color:rgba(248,113,113,.3)}

/* VENDOR PILLS */
.vpill{display:inline-block;font-size:11px;font-weight:700;font-family:"Saira Condensed",sans-serif;
  letter-spacing:.06em;padding:3px 9px;border-radius:20px;text-transform:uppercase}
.v-illy{background:rgba(96,165,250,.14);color:#60A5FA}
.v-ea{background:rgba(52,211,153,.14);color:#34D399}
.v-kennys{background:rgba(251,191,36,.14);color:#FBBF24}
.v-finleys{background:rgba(192,132,252,.14);color:#C084FC}
.v-surefire{background:rgba(251,146,60,.14);color:#FB923C}
.v-other{background:rgba(136,136,128,.14);color:var(--muted)}

/* CONFIDENCE */
.conf-tent{color:#FB923C;font-style:italic;font-size:12px;font-weight:500}
.conf-conf{color:#34D399;font-size:12px;font-weight:600}
.conf-tbd{color:#F87171;font-size:12px;font-weight:700;letter-spacing:.08em}

/* ETA */
.eta-overdue{color:#F87171;font-weight:700}
.eta-today{color:var(--yellow);font-weight:700}
.eta-soon{color:#FBBF24}
.eta-normal{color:var(--muted)}
.eta-tbd{color:var(--faint);font-style:italic}
.overdue-tag{display:inline-block;font-size:9px;background:rgba(248,113,113,.18);color:#F87171;
  border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}

/* GROUP HEADER */
.grp-hdr{background:var(--panel2);border-top:1px solid var(--line)}
.grp-hdr td{padding:8px 14px;font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:13px;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(6,8,10,.78);backdrop-filter:blur(4px);display:none;place-items:center;z-index:50;padding:16px}
.overlay.on{display:grid}
.modal{width:100%;max-width:520px;background:var(--panel);border:1px solid var(--line);border-radius:18px;
  padding:22px;box-shadow:var(--shadow);animation:rise .22s ease;max-height:92vh;overflow-y:auto}
@keyframes rise{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.modal-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.modal-po{font-family:"JetBrains Mono",monospace;font-weight:700;font-size:28px}
.modal-vendor{font-size:12px;color:var(--muted);margin-top:3px}
.mclose{appearance:none;border:0;background:transparent;color:var(--faint);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.mclose:hover{color:var(--ink)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-family:"Saira Condensed",sans-serif;font-weight:600}
.field input,.field select,.field textarea{background:var(--panel2);border:1px solid var(--line);border-radius:9px;
  color:var(--ink);font-family:"Saira",sans-serif;font-size:14px;padding:9px 11px;outline:none;transition:.14s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--yellow)}
.field select option{background:var(--panel2)}
.field textarea{resize:vertical;min-height:72px;font-size:13px}
.field.full{grid-column:1/-1}
.status-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.step-btn{appearance:none;cursor:pointer;border:1px solid var(--line);background:var(--panel2);color:var(--muted);
  font-family:"Saira Condensed",sans-serif;font-weight:600;font-size:12px;letter-spacing:.06em;text-transform:uppercase;
  padding:10px 6px;border-radius:10px;transition:.14s;display:flex;flex-direction:column;align-items:center;gap:4px}
.step-btn:hover{border-color:var(--yellow);color:var(--ink)}
.step-btn.active{color:#1A1200;border-color:transparent}
.step-icon{font-size:18px;line-height:1}
.arrived-time{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--muted);margin-bottom:14px;
  padding:9px 12px;background:var(--panel2);border-radius:9px;border:1px solid var(--line)}
.modal-actions{display:flex;gap:9px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.modal-actions .btn{flex:1;justify-content:center}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--panel2);
  border:1px solid var(--line);color:var(--ink);padding:10px 16px;border-radius:11px;font-size:13px;
  opacity:0;transition:.24s;z-index:60;box-shadow:var(--shadow);white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* EMPTY */
.empty{text-align:center;color:var(--faint);padding:50px 20px;font-size:13px;letter-spacing:.04em}

.import-drop{border:2px dashed var(--line);border-radius:12px;padding:28px 20px;text-align:center;
  cursor:pointer;transition:.18s;background:var(--panel2);position:relative}
.import-drop:hover,.import-drop.dragover{border-color:var(--yellow);background:rgba(245,197,24,.05)}
.import-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.import-drop .drop-icon{font-size:32px;margin-bottom:8px}
.import-drop .drop-lbl{font-size:14px;color:var(--muted)}
.import-drop .drop-sub{font-size:11px;color:var(--faint);margin-top:4px}
.import-or{display:flex;align-items:center;gap:10px;color:var(--faint);font-size:12px;margin:12px 0}
.import-or::before,.import-or::after{content:"";flex:1;height:1px;background:var(--line)}
.import-preview{max-height:200px;overflow:auto;margin-top:12px;border-radius:10px;border:1px solid var(--line)}
.import-preview table{font-size:11px}
.import-preview th{font-size:10px;padding:7px 10px;background:var(--panel2)}
.import-preview td{padding:6px 10px}
.col-match{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.col-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;
  background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);color:var(--yellow)}
.col-tag.miss{background:rgba(136,136,128,.1);border-color:var(--line);color:var(--muted)}
@media(max-width:640px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  table th:nth-child(4),table td:nth-child(4){display:none}
  .field-row{grid-template-columns:1fr}
  .status-steps{grid-template-columns:repeat(2,1fr)}
}

/* BOL & DAMAGE PHOTOS */
.attach-section{margin-bottom:14px}
.attach-section label{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-family:"Saira Condensed",sans-serif;margin-bottom:6px}
.attach-btns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.attach-btns .btn{flex:1;min-width:120px;justify-content:center;font-size:11px}
.bol-preview{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:12px;color:var(--ink)}
.bol-preview a{color:var(--yellow);text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bol-preview button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 2px;flex:none}
.bol-preview button:hover{color:#F87171}
.bol-placeholder{font-size:12px;color:var(--faint);font-style:italic;padding:4px 0}
.dmg-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.dmg-slot{aspect-ratio:1;border-radius:8px;border:1px dashed var(--line);background:var(--panel2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;transition:.14s}
.dmg-slot:hover{border-color:var(--yellow)}
.dmg-slot img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.dmg-slot .dmg-add{font-size:20px;color:var(--faint)}
.dmg-slot .dmg-del{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.75);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;line-height:1;padding:0;display:none;align-items:center;justify-content:center}
.dmg-slot:hover .dmg-del{display:flex}
.dmg-count{font-size:11px;color:var(--muted);margin-top:4px}
.dmg-photo-view{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.dmg-photo-view img{max-width:90vw;max-height:90vh;border-radius:10px;box-shadow:0 0 60px rgba(0,0,0,.8)}

/* ARCHIVE */
.arch-btn{display:inline-flex;align-items:center;gap:6px}
.archive-panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);margin-top:16px}
.archive-hdr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--panel2)}
.archive-hdr h2{font-family:"Saira Condensed",sans-serif;font-weight:700;font-size:18px;letter-spacing:.06em;text-transform:uppercase;margin:0;flex:1}
.archive-empty{text-align:center;color:var(--faint);padding:36px 20px;font-size:13px}
.arch-badge{background:rgba(52,211,153,.1);color:#34D399;border:1px solid rgba(52,211,153,.25);border-radius:20px;font-size:11px;font-weight:600;padding:2px 9px}

</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="nlogo">
        <span class="smiley">&#9786;</span>
        <span class="wordmark">neato</span>
      </div>
      <div class="divider"></div>
      <div class="app-title">Inbound Truck Tracker<small>FL-012 &nbsp;INBOUND OPS</small></div>
    </div>
    <div class="spacer"></div>
    <div class="clock-hdr" id="clk"></div>
    <div class="sync-pill" id="syncPill" data-state="offline" title="Working offline">
      <span class="dot"></span><span class="lbl">Offline</span>
    </div>
    <button class="btn primary" id="addBtn">&#43; New PO</button>
  </header>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="toolbar">
    <div class="seg">
      <label>View</label>
      <button data-view="all" class="active">All</button>
      <button data-view="active">Active</button>
      <button data-view="timeline">Timeline</button>
      <button data-view="complete">Complete</button>
    </div>
    <div class="seg">
      <label>Vendor</label>
      <button data-vendor="all" class="active">All</button>
      <button data-vendor="Illy">Illy</button>
      <button data-vendor="EA">EA</button>
      <button data-vendor="SureFire">SureFire</button>
                <button data-vendor="Kennys">Kennys</button>
                <button data-vendor="Finleys">Finleys</button>
      <button data-vendor="other">Other</button>
    </div>
    <input class="search-box" id="searchBox" placeholder="&#128269; Search PO, vendor, description…">
    <div class="spacer"></div>
    <button class="btn sm ghost" id="importBtn">&#11014; Import CSV</button>
    <button class="btn sm ghost" id="exportBtn">&#11015; Export CSV</button>
    <button class="btn sm ghost arch-btn" id="archiveBtn">&#128190; Archive</button>
  </div>

  <div class="tbl-wrap"><div id="mainContent"></div></div>
</div>

<div class="overlay" id="overlay"><div id="modalHost"></div></div>
<div class="toast" id="toast"></div>

<script>
(function(){
"use strict";
/* ââ storage (localStorage — persists across page reloads) ââ */
/* sync indicator (header pill next to #clk) */
var sync={
  pill:null, lbl:null, state:"offline",
  init:function(){
    this.pill=document.getElementById("syncPill");
    this.lbl=this.pill?this.pill.querySelector(".lbl"):null;
    this.refreshTooltip();
  },
  fmtTs:function(iso){
    if(!iso)return null;
    try{return new Date(iso).toLocaleTimeString();}catch(e){return iso;}
  },
  refreshTooltip:function(){
    if(!this.pill)return;
    var last=null;try{last=localStorage.getItem("lastSyncAt");}catch(e){}
    var t=this.fmtTs(last);
    if(this.state==="stale"){
      this.pill.title=t?("Sync failed — last synced at "+t):"Working offline";
    }else if(this.state==="synced"){
      this.pill.title=t?("Synced — last "+t):"Synced";
    }else if(this.state==="syncing"){
      this.pill.title="Syncing…";
    }else{
      this.pill.title=t?("Working offline — last synced "+t):"Working offline";
    }
  },
  set:function(state){
    this.state=state;
    if(!this.pill)return;
    this.pill.setAttribute("data-state",state);
    if(this.lbl){
      this.lbl.textContent=({synced:"Synced",syncing:"Syncing",stale:"Stale",offline:"Offline"})[state]||state;
    }
    this.refreshTooltip();
  },
  pulse:function(){
    if(!this.pill)return;
    this.pill.classList.remove("pulse");
    void this.pill.offsetWidth;
    this.pill.classList.add("pulse");
  },
  markSynced:function(){
    var ts=new Date().toISOString();
    try{localStorage.setItem("lastSyncAt",ts);}catch(e){}
    if(this.state!=="synced")this.set("synced");
    else this.refreshTooltip();
    this.pulse();
  },
  markStale:function(err){
    if(this.state!=="stale"){
      console.warn("[sync] cloud op failed:",(err&&err.message)?err.message:err);
      this.set("stale");
    }
  }
};

var pendingWrites = 0;                    // count of in-flight POSTs
var lastWriteAt = 0;                      // monotonic timestamp of most recent successful POST
var WRITE_GRACE_MS = 15000;               // poll-suppress window after a local write

var store={
  getJSON:function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}},
  setLocal:function(k,o){try{localStorage.setItem(k,JSON.stringify(o));}catch(e){}},
  setJSON:function(k,o){
    try{localStorage.setItem(k,JSON.stringify(o));}catch(e){}
    pendingWrites++;
    return fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k,value:o})})
      .then(function(r){
        if(!r.ok)throw new Error("HTTP "+r.status);
        lastWriteAt = Date.now();
        sync.markSynced();
      })
      .catch(function(err){sync.markStale(err);})
      .finally(function(){pendingWrites = Math.max(0, pendingWrites - 1);});
  },
  loadCloud:async function(k,d){
    try{
      var r=await fetch('/api/data?key='+encodeURIComponent(k));
      if(!r.ok)throw new Error("HTTP "+r.status);
      var j=await r.json();
      sync.markSynced();
      if(j&&j.value!==undefined){
        try{localStorage.setItem(k,JSON.stringify(j.value));}catch(e){}
        return j.value;
      }
      return d;
    }catch(e){
      sync.markStale(e);
      return d;
    }
  }
};

/* ââ helpers ââ */
function esc(s){return String(s||"").replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on");},2200);}
function isOverdue(p){return p.eta&&p.eta<todayStr&&p.status!=="complete";}
function isToday(p){return p.eta===todayStr;}
function daysUntil(eta){if(!eta)return null;var d=new Date(eta+T);d.setHours(0,0,0,0);return Math.round((d-today)/86400000);}
var T="T00:00:00";
function fmtEta(eta){
  if(!eta)return'<span class="eta-tbd">TBD</span>';
  var d=new Date(eta+T),du=daysUntil(eta);
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
  var s=mo+" "+d.getDate();
  if(du<0)return'<span class="eta-overdue">'+s+'<span class="overdue-tag">'+Math.abs(du)+'d overdue</span></span>';
  if(du===0)return'<span class="eta-today">'+s+' &#9679; Today</span>';
  if(du<=3)return'<span class="eta-soon">'+s+'</span>';
  return'<span class="eta-normal">'+s+'</span>';
}
function fmtConf(c){
  if(c==="confirmed")return'<span class="conf-conf">&#10003; Confirmed</span>';
  if(c==="tbd")return'<span class="conf-tbd">TBD</span>';
  return'<span class="conf-tent">Tentative</span>';
}
function vendorClass(v){var m={"Illy":"illy","EA":"ea","Kennys":"kennys","Finleys":"finleys","SureFire":"surefire"};return m[v]||"other";}
function statusClass(p){return isOverdue(p)?"s-overdue":"s-"+p.status;}
function statusLabel(p){
  if(isOverdue(p))return"Overdue";
  var m={pending:"Pending",confirmed:"Confirmed",transit:"In Transit",arrived:"Arrived",unloading:"Unloading",complete:"Complete"};
  return m[p.status]||p.status;
}
function fmtTs(ts){if(!ts)return"—";var d=new Date(ts);return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
var TIME_SLOTS=[
  {v:"06:00",l:"6:00 – 8:00 AM"},{v:"08:00",l:"8:00 – 10:00 AM"},
  {v:"10:00",l:"10:00 AM – 12:00 PM"},{v:"12:00",l:"12:00 – 2:00 PM"},
  {v:"14:00",l:"2:00 – 4:00 PM"},{v:"16:00",l:"4:00 – 6:00 PM"},
  {v:"18:00",l:"6:00 – 8:00 PM"},{v:"20:00",l:"8:00 – 10:00 PM"}
];
function fmtWindow(w){
  if(!w)return'<span style="color:var(--faint)">—</span>';
  var s=TIME_SLOTS.find(function(t){return t.v===w;});
  return'<span style="font-family:&quot;JetBrains Mono&quot;,monospace;font-size:11px;color:var(--yellow)">'+(s?s.l:w)+'</span>';
}

/* ââ filter ââ */
function filtered(){
  return pos.filter(function(p){
    if(curView==="active"&&p.status==="complete")return false;
    if(curView==="complete"&&p.status!=="complete")return false;
    if(curView==="active"&&p.status==="pending"&&!isOverdue(p)&&p.conf==="tbd")return false;
    if(curVendor!=="all"&&curVendor!=="other"&&p.vendor!==curVendor)return false;
    if(curVendor==="other"&&["Illy","EA","SureFire","Kennys","Finleys"].indexOf(p.vendor)>=0)return false;
    if(searchTerm){var q=searchTerm.toLowerCase();if(p.po.indexOf(q)<0&&p.vendor.toLowerCase().indexOf(q)<0&&p.desc.toLowerCase().indexOf(q)<0)return false;}
    return true;
  });
}

/* ââ kpis ââ */
function renderKPI(){
  var total=pos.length,overdue=pos.filter(isOverdue).length;
  var arriving=pos.filter(function(p){var d=daysUntil(p.eta);return d!==null&&d<=7&&d>=0&&p.status!=="complete";}).length;
  var inprog=pos.filter(function(p){return p.status==="arrived"||p.status==="unloading"||p.status==="transit";}).length;
  var complete=pos.filter(function(p){return p.status==="complete";}).length;
  var kpis=[
    {v:total,l:"Total POs",c:"var(--yellow)"},
    {v:overdue,l:"Overdue",c:"var(--s-overdue)"},
    {v:arriving,l:"Arriving 7 Days",c:"var(--s-transit)"},
    {v:inprog,l:"In Progress",c:"var(--s-arrived)"},
    {v:complete,l:"Completed",c:"var(--s-complete)"}
  ];
  document.getElementById("kpiRow").innerHTML=kpis.map(function(k){
    return'<div class="kpi" style="--kc:'+k.c+'"><div class="kv">'+k.v+'</div><div class="kl">'+k.l+'</div></div>';
  }).join("");
}

function renderTable(list){

  });

    return'<tr data-id="'+p.id+'">'+
      '<td><span class="sbadge '+statusClass(p)+'">'+statusLabel(p)+'</span></td>'+

    '</tr></thead><tbody>'+rows+'</tbody></table>';
}

function renderTimeline(list){
  // Group by ETA date
  var groups={}, gkeys=[];
  var pastKey="__past__";
  list.forEach(function(p){
    var k=p.eta||"__tbd__";
    if(p.eta&&p.eta<todayStr&&p.status!=="complete")k=pastKey;
    if(!groups[k]){groups[k]=[];gkeys.push(k);}
    groups[k].push(p);
  });
  gkeys.sort(function(a,b){
    if(a===pastKey)return-1;if(b===pastKey)return 1;
    if(a==="__tbd__")return 1;if(b==="__tbd__")return-1;
    return a.localeCompare(b);
  });
  var rows="";
  gkeys.forEach(function(k){
    var grp=groups[k].slice().sort(function(a,b){if(!a.arrivalWindow)return 1;if(!b.arrivalWindow)return -1;return a.arrivalWindow.localeCompare(b.arrivalWindow);});
    var grpLabel;
    if(k===pastKey)grpLabel='<span style="color:var(--s-overdue)">&#9888; Overdue / Past ETA</span>';
    else if(k==="__tbd__")grpLabel='<span style="color:var(--faint)">TBD — Date Not Set</span>';
    else{var d=new Date(k+T),du=daysUntil(k);var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];
      var lbl=mo+" "+d.getDate()+", "+d.getFullYear();
      if(du===0)lbl+='&nbsp;&nbsp;<span style="color:var(--yellow);font-size:11px">TODAY</span>';
      else if(du===1)lbl+='&nbsp;&nbsp;<span style="color:var(--s-transit);font-size:11px">TOMORROW</span>';
      grpLabel=lbl;}
    rows+='<tr class="grp-hdr"><td colspan="8">'+grpLabel+'&nbsp;&nbsp;<span style="color:var(--faint);font-size:10px">('+grp.length+' PO'+(grp.length>1?"s":"")+')</span></td></tr>';
    grp.forEach(function(p){
      rows+='<tr data-id="'+p.id+'">'+
        '<td><span class="sbadge '+statusClass(p)+'">'+statusLabel(p)+'</span></td>'+
        '<td><span class="po-num">'+esc(p.po)+'</span></td>'+
        '<td><span class="vpill v-'+vendorClass(p.vendor)+'">'+esc(p.vendor)+'</span></td>'+
        '<td style="color:var(--muted);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.desc||"—")+'</td>'+
        '<td>'+fmtWindow(p.arrivalWindow)+'</td>'+
        '<td>'+fmtConf(p.conf)+'</td>'+
        '<td>'+(p.dock?'<span style="color:var(--muted);font-size:12px">Door '+esc(p.dock)+'</span>':'')+'</td>'+
        '<td>'+(p.arrivedAt?'<span class="mono" style="font-size:12px;color:var(--s-arrived)">&#9679; '+fmtTs(p.arrivedAt)+'</span>':'')+'</td>'+
        '<td style="text-align:right"><button class="btn sm" data-edit="'+p.id+'">&#9998; Edit</button></td>'+
      '</tr>';
    });
  });
  document.getElementById("mainContent").innerHTML=
    '<table><thead><tr>'+
    '<th>Status</th><th>PO #</th><th>Vendor</th><th>Description</th><th>Window</th><th>Confidence</th><th>Dock</th><th class="mono">Check-in</th><th></th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table>';
}

function autoArchiveStale(){
  var THIRTY_DAYS = 30 * 24 * 60 * 60 * 1000;
  var now = Date.now();
  var toArchive = pos.filter(function(p){
    return p.status === "complete" && p.completedAt && (now - p.completedAt) >= THIRTY_DAYS;
  });
  if(!toArchive.length) return;
  var arch = store.getJSON("archive", []);
  toArchive.forEach(function(p){
    var existIdx = arch.findIndex(function(x){return x.id===p.id;});
    if(existIdx >= 0) arch[existIdx] = p; else arch.push(p);
  });

/* ââ CSV import ââ */
function parseCSVText(txt){
  var lines=txt.trim().replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
  if(!lines.length)return[];
  return lines.map(function(line){
    var fields=[],cur='',inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){fields.push(cur.trim());cur='';}
      else cur+=c;
    }
    fields.push(cur.trim());
    return fields;
  });
}
function detectCols(headers){
  var map={},h=headers.map(function(x){return(x||'').toLowerCase().replace(/[^a-z0-9]/g,'');});
  var defs={po:['po','ponum','ponumber','purchaseorder'],vendor:['vendor','vendorname','supplier'],
    desc:['description','desc','contents','detail','details'],eta:['eta','arrivaldate','deliverydate','expecteddate','date'],
    arrivalwindow:['arrivalwindow','window','timewindow','arrivaltime'],
    conf:['confidence','conf','status2'],dock:['dock','dockdoor','door'],
    notes:['notes','note','comments','comment'],status:['status']};
  Object.keys(defs).forEach(function(field){
    defs[field].forEach(function(alias){
      var idx=h.indexOf(alias);if(idx>=0&&map[field]===undefined)map[field]=idx;
    });
  });
  return map;
}
function parseETA(s){
  if(!s||/^(tbd|n\/a|none|-)$/i.test(s.trim()))return null;
  var c=s.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(c))return c;
  var md=c.match(/^(\d{1,2})\/(\d{1,2})(?:\/(\d{4}))?$/);
  if(md){var y=md[3]||new Date().getFullYear();return y+'-'+String(md[1]).padStart(2,'0')+'-'+String(md[2]).padStart(2,'0');}
  var MONS={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  var dm=c.match(/^(\d{1,2})[- ]([a-zA-Z]+)(?:[- ](\d{4}))?$/);
  if(dm){var mn=MONS[dm[2].slice(0,3).toLowerCase()];if(mn){var y=dm[3]||new Date().getFullYear();return y+'-'+String(mn).padStart(2,'0')+'-'+String(dm[1]).padStart(2,'0');}}
  var md2=c.match(/^([a-zA-Z]+)[- ](\d{1,2})(?:[- ,](\d{4}))?$/);
  if(md2){var mn=MONS[md2[1].slice(0,3).toLowerCase()];if(mn){var y=md2[3]||new Date().getFullYear();return y+'-'+String(mn).padStart(2,'0')+'-'+String(md2[2]).padStart(2,'0');}}
  return null;
}
function parseConf(s){if(!s)return'tbd';var l=s.toLowerCase().trim();if(l.indexOf('confirm')>=0)return'confirmed';if(l.indexOf('tent')>=0)return'tentative';return'tbd';}
function parseWin(s){if(!s||s==='—')return'';var t=TIME_SLOTS.find(function(x){return x.l===s||x.v===s;});return t?t.v:'';}

function executeImport(){
  if(!_importRows||!_importMap)return;
  var map=_importMap,modeEl=document.querySelector('input[name="importMode"]:checked');
  var mode=modeEl?modeEl.value:'merge';
  var imported=0,updated=0;

    var get=function(f){return map[f]!==undefined?(r[map[f]]||'').trim():'';};
    var poNum=get('po')||('IMP-'+Date.now()+'-'+Math.random().toString(36).slice(2,5));

      id:'po'+poNum.replace(/\s/g,''),po:poNum,vendor:get('vendor')||'Unknown',
      desc:get('desc'),eta:parseETA(get('eta')),conf:parseConf(get('conf')),
      status:get('status')||'pending',arrivalWindow:parseWin(get('arrivalwindow')),
      dock:get('dock'),notes:get('notes'),arrivedAt:null,completedAt:null
    };
  });
  if(mode==='replace'){
    pos=newPOs;imported=newPOs.length;
  } else {
    newPOs.forEach(function(np){
      var existing=pos.find(function(p){return p.po===np.po;});

      else{pos.push(np);imported++;}

}

// Compress an image File to a JPEG dataURL no larger than MAX_DIM on the long side.
// Returns a Promise resolving to the dataURL string.
function compressImage(file, maxDim, quality){
  maxDim = maxDim || 1600;
  quality = quality || 0.75;
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var w = img.naturalWidth, h = img.naturalHeight;
        var scale = Math.min(1, maxDim / Math.max(w, h));
        var cw = Math.round(w * scale), ch = Math.round(h * scale);
        var canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, cw, ch);
        try {
          resolve(canvas.toDataURL('image/jpeg', quality));
        } catch(err) {
          reject(err);
        }
      };
      img.onerror = function(){ reject(new Error('Could not decode image')); };
      img.src = e.target.result;
    };
    reader.onerror = function(){ reject(new Error('Could not read file')); };
    reader.readAsDataURL(file);
  });
}

      '<td><span class="vpill v-'+vendorClass(p.vendor)+'">'+esc(p.vendor)+'</span></td>'+
      '<td style="color:var(--muted);font-size:13px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.desc||"—")+'</td>'+
      '<td>'+bolBadge+dmgBadge+'</td>'+
      '<td style="text-align:right"><button class="btn sm" data-arch-view="'+p.id+'">&#128065; View</button></td>'+
      '<td><button class="btn sm" data-arch-edit="'+p.id+'">&#9998; Edit</button></td>'+
      '</tr>';
  }).join('') : '<tr><td colspan="6"><div class="archive-empty">No archived POs yet. Completed POs will appear here.</div></td></tr>';
  
  host.innerHTML = '<div class="modal" style="max-width:680px">'+
    '<div class="modal-hdr">'+
      '<div><div class="modal-po" style="font-size:20px">&#128190; Archive</div>'+
      '<div style="font-size:12px;color:var(--muted);margin-top:3px">'+archived.length+' completed PO'+(archived.length!==1?'s':'')+'</div></div>'+
      '<button class="mclose" id="mClose">&#215;</button>'+
    '</div>'+
    '<div style="overflow-x:auto">'+
    '<table><thead><tr><th>Completed</th><th>PO #</th><th>Vendor</th><th>Description</th><th>Attachments</th><th></th><th></th></tr></thead>'+
    '<tbody>'+rows+'</tbody></table></div>'+
    '<div class="modal-actions"><div style="flex:1"></div>'+
    '<button class="btn ghost" id="mCancel">Close</button>'+
    '<button class="btn danger" id="archClearBtn" style="'+(archived.length?'':'display:none')+'">&#128465; Clear Archive</button>'+
    '</div></div>';
  overlay.classList.add('on');
  document.getElementById('mClose').onclick = closeModal;
  document.getElementById('mCancel').onclick = closeModal;
  var clearBtn = document.getElementById('archClearBtn');
  if(clearBtn) clearBtn.onclick = function(){
    if(!confirm('Clear all '+archived.length+' archived POs? This cannot be undone.')) return;
    store.setJSON('archive',[]);
    toast('Archive cleared');
    closeModal();
  };
  // View archived PO detail
  host.querySelectorAll('[data-arch-view]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var id = this.getAttribute('data-arch-view');
      var p = store.getJSON('archive',[]).find(function(x){return x.id===id;});
      if(!p) return;
      openArchivedPO(p);
    };
  });
  // Edit archived PO
  host.querySelectorAll('[data-arch-edit]').forEach(function(btn){
    btn.onclick = function(e){
      e.stopPropagation();
      var id = btn.getAttribute('data-arch-edit');
      var archived = store.getJSON('archive',[]);
      var p = archived.find(function(x){return x.id===id;});
      if(!p) return;
      editArchiveId = id;
      openModal(id);
    };
  });
}

/* ââ boot ââ */
(async function(){
  var DATA_VER="v2";
  sync.init();

  // Snapshot localStorage BEFORE loadCloud (loadCloud writes-through on success).
  var localPosVer=store.getJSON("posVer",null);
  var localPosSnap=store.getJSON("pos",null);
  var localArchSnap=store.getJSON("archive",null);

  // Await cloud read first — do not POST defaults until we know what cloud has.
  var cloudPos=await store.loadCloud("pos",null);
  var cloudArch=await store.loadCloud("archive",null);

  // Resolve pos: cloud wins if non-empty; otherwise local snapshot if non-empty; otherwise DEFAULT_POS.
  if(cloudPos&&cloudPos.length){
    pos=cloudPos;
    store.setLocal("pos",pos);
  }else if(localPosSnap&&localPosSnap.length){
    pos=localPosSnap;
    store.setJSON("pos",pos);
  }else{
    pos=DEFAULT_POS;
    store.setJSON("pos",pos);
  }

  // Resolve archive: cloud wins; else push local up; else leave untouched.
  if(cloudArch){
    store.setLocal("archive",cloudArch);
  }else if(localArchSnap){
    store.setJSON("archive",localArchSnap);
  }

  // Schema-version check happens AFTER cloud settles — log drift, do not auto-clear.
  if(localPosVer!==DATA_VER){
    console.log("[boot] posVer drift: local="+localPosVer+" current="+DATA_VER+" (not clearing in this PR)");
    store.setLocal("posVer",DATA_VER);
  }

  autoArchiveStale();
  render();

  // Polling layer (D2(b)): 10s GET /api/data?key=pos with modal + visibility guards.
  var POLL_MS=10000;
  var pollTimer=null;
  var pollInFlight=false;

  function modalOpen(){
    var ov=document.getElementById("overlay");
    return !!(ov&&getComputedStyle(ov).display!=="none");
  }
  function pollPaused(){return modalOpen()||document.hidden;}

  async function pollOnce(){
    if(pollPaused())return;
    if(pollInFlight)return;
    if(pendingWrites > 0)return;                                  // write in flight — let it land
    if(Date.now() - lastWriteAt < WRITE_GRACE_MS)return;          // post-write grace — local is authoritative
    pollInFlight=true;
    try{
      var r=await fetch("/api/data?key=pos");
      if(!r.ok)throw new Error("HTTP "+r.status);
      var j=await r.json();
      sync.markSynced();
      if(!j||j.value===undefined)return;
      if(pollPaused())return; // modal opened mid-flight — skip to avoid clobber
      var cloudPos=j.value;
      if(JSON.stringify(cloudPos)!==JSON.stringify(pos)){
        pos=cloudPos;
        store.setLocal("pos",pos);
        render();
      }
    }catch(e){
      sync.markStale(e);
    }finally{
      pollInFlight=false;
    }
  }

  function startPolling(){
    if(pollTimer)clearInterval(pollTimer);
    pollTimer=setInterval(pollOnce,POLL_MS);
  }
  function stopPolling(){
    if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  }

  document.addEventListener("visibilitychange",function(){
    if(document.hidden){
      stopPolling();
    }else{
      pollOnce();      // immediate refresh on tab focus
      startPolling();
    }
  });

  if(!document.hidden)startPolling();
})();
})();
</script>
